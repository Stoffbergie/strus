app = "strus-api"
primary_region = "fra"

[build]
  dockerfile = "apps/ingest/Dockerfile"

[env]
  PORT = "8080"
  BUFFER_FLUSH_MS = "1000"
  BUFFER_MAX_SIZE = "500"
  DB_POOL_SIZE = "20"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
