name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: React Doctor
        run: bun run doctor

      - name: Build
        run: bunx turbo build --concurrency=2
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/strus
          WORKOS_API_KEY: sk_test_placeholder
          WORKOS_CLIENT_ID: client_placeholder
          WORKOS_COOKIE_PASSWORD: 00000000000000000000000000000000
          RESEND_API_KEY: re_placeholder
          HMAC_SECRET: 00000000000000000000000000000000
          NEXT_PUBLIC_WORKOS_REDIRECT_URI: http://localhost:3000/callback
